<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light;
        --accent: #0ea5e9;
        --accent-hover: #0284c7;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b7280;
        --border: #e5e7eb;
        --surface: #f9fafb;
        --success: #16a34a;
        --error: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px 10px;
      }

      .header img {
        width: 20px;
        height: 20px;
        border-radius: 4px;
      }

      .header h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.01em;
      }

      .body {
        padding: 4px 16px 16px;
      }

      button {
        width: 100%;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.05s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button:active:not(:disabled) {
        transform: scale(0.98);
      }

      button:disabled {
        background: var(--accent);
        opacity: 0.6;
        cursor: default;
      }

      .spinner {
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
        flex: none;
      }

      button.running .spinner {
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #status {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
        min-height: 16px;
        white-space: pre-wrap;
        display: flex;
        align-items: flex-start;
        gap: 6px;
      }

      #status.success {
        color: var(--success);
      }

      #status.error {
        color: var(--error);
      }

      #status .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-top: 4px;
        flex: none;
        background: currentColor;
        display: none;
      }

      #status.success .dot,
      #status.error .dot {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="icon.svg" alt="" />
      <h1>IIT KGP ERP Login</h1>
    </div>
    <div class="body">
      <button id="login-btn" data-target="erp">
        <span class="spinner"></span>
        <span class="label">Log in to Academic</span>
      </button>
      <button id="cdc-btn" data-target="cdc" style="margin-top: 8px;">
        <span class="spinner"></span>
        <span class="label">Log in to CDC</span>
      </button>
      <div id="status"><span class="dot"></span><span class="text"></span></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
