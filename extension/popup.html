<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <img class="logo" src="icon.svg" alt="" />
      <div class="title">
        <h1>IIT KGP ERP Login</h1>
        <span class="subtitle">One-click sign in</span>
      </div>
    </div>

    <div class="body">
      <div class="section-label">Choose portal</div>

      <div class="options">
        <button id="login-btn" class="primary" data-target="erp">
          <span class="spinner" aria-hidden="true"></span>
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
            <path d="M6 12v5c3 3 9 3 12 0v-5" />
          </svg>
          <span class="label">Academic</span>
        </button>

        <button id="cdc-btn" class="secondary" data-target="cdc">
          <span class="spinner" aria-hidden="true"></span>
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="14" x="2" y="7" rx="2" ry="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          </svg>
          <span class="label">CDC</span>
        </button>
      </div>

      <div id="status" role="status" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span class="text">Ready to sign in.</span>
      </div>
    </div>

    <div class="footer" id="footer">Secure · Local only</div>

    <script src="popup.js"></script>
  </body>
</html>
